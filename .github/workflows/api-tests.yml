name: API Tests — NEXUS-API (RestAssured + Java 17)

on:
  push:
    branches: [main]
    paths:
      - 'lojinha-api-tests/**'
      - 'agents/NEXUS-API.md'
      - '.github/workflows/api-tests.yml'
  pull_request:
    branches: [main]
    paths:
      - 'lojinha-api-tests/**'
  workflow_dispatch:

jobs:
  restassured:
    name: RestAssured API Tests
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Java 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: 'gradle'

      - name: Validate Gradle wrapper
        working-directory: lojinha-api-tests
        run: |
          ./gradlew --version

      - name: Run API tests
        working-directory: lojinha-api-tests
        run: ./gradlew test --info
        env:
          BASE_URL: ${{ vars.LOJINHA_BASE_URL || 'http://165.227.93.41' }}

      - name: Upload JUnit XML results
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: api-test-results-${{ github.run_number }}
          path: lojinha-api-tests/build/test-results/
          retention-days: 14

      - name: Upload Gradle HTML report
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: api-test-report-${{ github.run_number }}
          path: lojinha-api-tests/build/reports/tests/
          retention-days: 14

      - name: Publish test summary
        uses: dorny/test-reporter@v1
        if: always()
        with:
          name: NEXUS-API Test Results
          path: lojinha-api-tests/build/test-results/**/*.xml
          reporter: java-junit
          fail-on-error: false

      - name: Quality gate
        if: always()
        working-directory: lojinha-api-tests
        run: |
          echo "## NEXUS-API — RestAssured Results" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "📊 Full report available in artifacts: \`api-test-report-${{ github.run_number }}\`" >> $GITHUB_STEP_SUMMARY
