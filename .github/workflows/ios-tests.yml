name: iOS Tests — KAUE-MOBILE (Maestro)

on:
  push:
    branches: [main]
    paths:
      - 'mobile/ios/**'
      - 'agents/KAUE-MOBILE.md'
      - '.github/workflows/ios-tests.yml'
  pull_request:
    branches: [main]
    paths:
      - 'mobile/ios/**'
  workflow_dispatch:
    inputs:
      device:
        description: 'Simulator device name (ex: iPhone 15 Pro, iPhone 16)'
        required: false
        default: 'iPhone 15 Pro'

jobs:
  ios-smoke:
    name: iOS Safari — Google Search (Maestro)
    runs-on: macos-14           # Apple Silicon — único runner com simulador iOS
    timeout-minutes: 30

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Select Xcode
        run: sudo xcode-select -s /Applications/Xcode_15.4.app/Contents/Developer

      - name: Install Maestro CLI
        run: |
          curl -fsSL "https://get.maestro.mobile.dev" | bash
          echo "$HOME/.maestro/bin" >> $GITHUB_PATH

      - name: Boot iOS Simulator
        run: |
          DEVICE="${{ github.event.inputs.device || 'iPhone 15 Pro' }}"

          echo "=== Simuladores disponíveis ==="
          xcrun simctl list devices available

          # simctl lista iOS version como cabeçalho de seção, não na linha do device.
          # Estratégia: pegar o UDID do device desejado sem filtrar por versão iOS —
          # no macos-14 runner há apenas uma versão disponível (iOS 17.x).
          UDID=$(xcrun simctl list devices available | grep -w "$DEVICE" | head -1 | grep -Eo '[0-9A-F-]{36}')

          if [ -z "$UDID" ]; then
            echo "AVISO: '$DEVICE' não encontrado. Listando iPhones disponíveis:"
            xcrun simctl list devices available | grep "iPhone"
            # Fallback: qualquer iPhone disponível
            UDID=$(xcrun simctl list devices available | grep "iPhone" | grep -v "unavailable" | head -1 | grep -Eo '[0-9A-F-]{36}')
          fi

          if [ -z "$UDID" ]; then
            echo "ERRO: Nenhum simulador iPhone encontrado."
            exit 1
          fi

          echo "Usando simulador UDID: $UDID"
          echo "SIMULATOR_UDID=$UDID" >> $GITHUB_ENV

          xcrun simctl boot "$UDID" 2>/dev/null || echo "Simulador já estava bootado"
          open -a Simulator --args -CurrentDeviceUDID "$UDID"

          # Aguarda o simulador ficar no estado Booted
          echo "Aguardando simulador..."
          for i in $(seq 1 30); do
            STATE=$(xcrun simctl list devices | grep "$UDID" | grep -o 'Booted' || true)
            if [ "$STATE" = "Booted" ]; then
              echo "Simulador pronto após ${i}s"
              break
            fi
            sleep 2
          done
          sleep 5

      - name: Run Safari Google Search test
        run: |
          maestro test mobile/ios/maestro/flows/safari_google_search.yaml \
            --device "${{ env.SIMULATOR_UDID }}" \
            --format junit \
            --output test-results/ios-results.xml
        env:
          MAESTRO_DRIVER_STARTUP_TIMEOUT: 60000

      - name: Upload test results
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: ios-maestro-results-${{ github.run_number }}
          path: |
            test-results/
            ~/.maestro/tests/
          retention-days: 14

      - name: Publish test report
        uses: dorny/test-reporter@v1
        if: always()
        with:
          name: iOS Maestro Results
          path: test-results/ios-results.xml
          reporter: java-junit
          fail-on-error: false

      - name: Generate summary
        if: always()
        run: |
          echo "## KAUE-MOBILE — iOS Maestro Results" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "| Campo | Valor |" >> $GITHUB_STEP_SUMMARY
          echo "|-------|-------|" >> $GITHUB_STEP_SUMMARY
          echo "| Dispositivo | ${{ github.event.inputs.device || 'iPhone 15 Pro' }} |" >> $GITHUB_STEP_SUMMARY
          echo "| Simulador UDID | ${{ env.SIMULATOR_UDID }} |" >> $GITHUB_STEP_SUMMARY
          echo "| Flow | safari_google_search.yaml |" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          if [ -f test-results/ios-results.xml ]; then
            echo "Resultados disponíveis no artifact: \`ios-maestro-results-${{ github.run_number }}\`" >> $GITHUB_STEP_SUMMARY
          else
            echo "Arquivo de resultados não encontrado." >> $GITHUB_STEP_SUMMARY
          fi

  # Job opcional — Maestro Cloud (dispositivo real iOS, acionado manualmente)
  ios-cloud:
    name: iOS Real Device — Maestro Cloud
    runs-on: ubuntu-latest
    if: github.event_name == 'workflow_dispatch' && vars.USE_MAESTRO_CLOUD == 'true'
    needs: ios-smoke
    timeout-minutes: 20

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Maestro CLI
        run: |
          curl -fsSL "https://get.maestro.mobile.dev" | bash
          echo "$HOME/.maestro/bin" >> $GITHUB_PATH

      - name: Upload and run on Maestro Cloud (iOS)
        run: |
          maestro cloud \
            --apiKey "${{ secrets.MAESTRO_CLOUD_API_KEY }}" \
            --ios-version 17 \
            mobile/ios/maestro/flows/safari_google_search.yaml
