name: Mobile Smoke — KAUE-MOBILE (Maestro)

on:
  push:
    branches: [main]
    paths:
      - 'mobile/android/maestro/**'
      - 'agents/KAUE-MOBILE.md'
      - '.github/workflows/mobile-smoke.yml'
  pull_request:
    branches: [main]
    paths:
      - 'mobile/android/maestro/**'
  workflow_dispatch:
    inputs:
      run_on_device:
        description: 'Rodar em dispositivo real via Maestro Cloud'
        required: false
        default: 'false'
        type: boolean

jobs:
  maestro-emulator:
    name: Maestro Flows — Android Emulator
    runs-on: ubuntu-latest
    timeout-minutes: 45

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Java (necessário para o emulador Android)
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Install Maestro CLI
        run: |
          curl -Ls "https://get.maestro.mobile.dev" | bash
          echo "$HOME/.maestro/bin" >> $GITHUB_PATH

      - name: Start Android Emulator (API 30)
        uses: reactivecircus/android-emulator-runner@v2
        with:
          api-level: 30
          arch: x86_64
          profile: Nexus 6
          avd-name: test
          emulator-options: -no-snapshot-save -no-window -gpu swiftshader_indirect -noaudio -no-boot-anim
          disable-animations: true
          script: echo "Emulator started"

      - name: Wait for emulator to be ready
        run: adb wait-for-device shell 'while [ "$(getprop sys.boot_completed)" != "1" ]; do sleep 3; done'

      - name: Install APK on emulator
        run: |
          # O APK não está no repo (ignorado pelo .gitignore)
          # Em produção: baixe o APK de um release ou artifact de build
          # adb install mobile/android/apk/app.apk
          echo "⚠️  APK não incluído no repo. Configure o download via secrets ou artifacts."
          echo "Exemplo: adb install \${{ secrets.APK_PATH }}"

      - name: Run Maestro smoke flows
        run: |
          maestro test mobile/android/maestro/flows/login.yaml \
            --format junit \
            --output results/maestro-login.xml || true

          maestro test mobile/android/maestro/flows/navigation.yaml \
            --format junit \
            --output results/maestro-navigation.xml || true

      - name: Upload Maestro results
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: maestro-results-${{ github.run_number }}
          path: results/maestro-*.xml
          retention-days: 14

      - name: Summary
        if: always()
        run: |
          echo "## KAUE-MOBILE — Maestro Results" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "Flows executados:" >> $GITHUB_STEP_SUMMARY
          echo "- login.yaml" >> $GITHUB_STEP_SUMMARY
          echo "- navigation.yaml" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "> Para flows completos com dispositivo real: configure \`MAESTRO_API_KEY\` e use Maestro Cloud." >> $GITHUB_STEP_SUMMARY

  maestro-cloud:
    name: Maestro Cloud — Dispositivo Real
    runs-on: ubuntu-latest
    timeout-minutes: 30
    # Só roda quando acionado manualmente com run_on_device=true
    if: github.event.inputs.run_on_device == 'true'

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Run on Maestro Cloud (dispositivo real)
        uses: mobile-dev-inc/action-maestro-cloud@v1
        with:
          api-key: ${{ secrets.MAESTRO_CLOUD_API_KEY }}
          app-file: ${{ secrets.APK_PATH }}
          workspace: mobile/android/maestro/
          android-api-level: 30
