name: Mobile Smoke — KAUE-MOBILE (Maestro Android)

on:
  push:
    branches: [main]
    paths:
      - 'mobile/android/maestro/**'
      - 'agents/KAUE-MOBILE.md'
      - '.github/workflows/mobile-smoke.yml'
  pull_request:
    branches: [main]
    paths:
      - 'mobile/android/maestro/**'
  workflow_dispatch:
    inputs:
      run_on_cloud:
        description: 'Rodar em dispositivo real via Maestro Cloud'
        required: false
        default: 'false'
        type: boolean

jobs:
  maestro-emulator:
    name: Maestro Flows — Android Emulator
    runs-on: ubuntu-latest
    timeout-minutes: 45

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Install Maestro CLI
        run: |
          curl -Ls "https://get.maestro.mobile.dev" | bash
          echo "$HOME/.maestro/bin" >> $GITHUB_PATH

      - name: Create results directory
        run: mkdir -p results

      # Baixa o APK publicado no GitHub Release v1.0.0-apk
      - name: Download APK from release
        run: |
          gh release download v1.0.0-apk \
            --repo ${{ github.repository }} \
            --pattern "*.apk" \
            --dir mobile/android/apk/
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Enable KVM (hardware acceleration for emulator)
        run: |
          echo 'KERNEL=="kvm", GROUP="kvm", MODE="0666", OPTIONS+="static_node=kvm"' | sudo tee /etc/udev/rules.d/99-kvm4all.rules
          sudo udevadm control --reload-rules
          sudo udevadm trigger --name-match=kvm

      - name: Run Maestro flows on emulator
        uses: reactivecircus/android-emulator-runner@v2
        with:
          api-level: 30
          arch: x86_64
          profile: pixel_2
          avd-name: kaue_test
          emulator-options: -no-snapshot-save -no-window -gpu swiftshader_indirect -noaudio -no-boot-anim -camera-back none
          disable-animations: true
          script: |
            # Instala o APK no emulador
            APK=$(find mobile/android/apk -name "*.apk" | head -1)
            echo "Instalando APK: $APK"
            adb install -r "$APK"

            # Aguarda o app estar pronto
            sleep 3

            # Roda os flows Maestro
            maestro test mobile/android/maestro/flows/login.yaml \
              --format junit \
              --output results/maestro-login.xml || true

            maestro test mobile/android/maestro/flows/navigation.yaml \
              --format junit \
              --output results/maestro-navigation.xml || true

      - name: Upload Maestro results
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: maestro-android-results-${{ github.run_number }}
          path: results/maestro-*.xml
          retention-days: 14

      - name: Publish test report
        uses: dorny/test-reporter@v1
        if: always()
        with:
          name: KAUE-MOBILE Android Results
          path: results/maestro-*.xml
          reporter: java-junit
          fail-on-error: false

      - name: Summary
        if: always()
        run: |
          echo "## KAUE-MOBILE — Maestro Android Results" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "| Flow | Arquivo de resultado |" >> $GITHUB_STEP_SUMMARY
          echo "|------|---------------------|" >> $GITHUB_STEP_SUMMARY
          echo "| login.yaml | results/maestro-login.xml |" >> $GITHUB_STEP_SUMMARY
          echo "| navigation.yaml | results/maestro-navigation.xml |" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "APK: twp.apk (baixado de GitHub Release v1.0.0-apk)" >> $GITHUB_STEP_SUMMARY

  # Job opcional — Maestro Cloud (dispositivo real Android, acionado manualmente)
  maestro-cloud:
    name: Maestro Cloud — Dispositivo Real
    runs-on: ubuntu-latest
    timeout-minutes: 30
    if: github.event.inputs.run_on_cloud == 'true'

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Download APK from release
        run: |
          gh release download v1.0.0-apk \
            --repo ${{ github.repository }} \
            --pattern "*.apk" \
            --dir mobile/android/apk/
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Run on Maestro Cloud (dispositivo real)
        uses: mobile-dev-inc/action-maestro-cloud@v1
        with:
          api-key: ${{ secrets.MAESTRO_CLOUD_API_KEY }}
          app-file: mobile/android/apk/twp.apk
          workspace: mobile/android/maestro/
          android-api-level: 30
