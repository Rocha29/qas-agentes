  <rect x="18" y="66" width="148" height="36" rx="6" fill="#1c1500" stroke="#f59e0b" stroke-width="1.5" stroke-opacity="0.7"/>
  <text x="92" y="81" text-anchor="middle" font-family="'Segoe UI', system-ui" font-size="9" fill="#f59e0b" font-weight="700" letter-spacing="0.5">MODO ORQUESTRADO</text>
  <text x="92" y="95" text-anchor="middle" font-family="'Segoe UI', system-ui" font-size="9" fill="#8b949e">SIGMA-LEAD decide tudo</text>

  <rect x="794" y="66" width="148" height="36" rx="6" fill="#161b22" stroke="#4b5563" stroke-width="1.5"/>
