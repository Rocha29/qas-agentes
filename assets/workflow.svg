  <text x="480" y="34" text-anchor="middle"
        font-family="'Segoe UI', system-ui, -apple-system, sans-serif"
        font-size="20" font-weight="700" fill="#f0f6fc" letter-spacing="3">
    QA AGENT PIPELINE
  </text>
  <text x="480" y="54" text-anchor="middle"
        font-family="'Segoe UI', system-ui, sans-serif"
